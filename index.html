  // Keyboard navigation: menu mode
  let kbSuggIdx = -1;
  let menuMode = false;
  const queryPanel = document.getElementById('query-panel');

  function setMenuMode(on) {
    menuMode = on;
    queryPanel.classList.toggle('menu-mode', on);
    document.querySelectorAll('.query-tab').forEach(t => t.classList.remove('tab-focus'));
    if (on) {
      // Highlight active tab
      const active = queryPanel.querySelector('.query-tab.active');
      if (active) active.classList.add('tab-focus');
      cmdInput.blur();
    } else {
      kbSuggIdx = -1;
      highlightSuggestion(-1);
      focusInput();
    }
  }

  function highlightSuggestion(idx) {
    const items = suggestionsEl.querySelectorAll('.suggestion');
    items.forEach(s => s.classList.remove('kb-active'));
    if (idx >= 0 && idx < items.length) {
      items[idx].classList.add('kb-active');
      items[idx].scrollIntoView({ block: 'nearest', inline: 'nearest' });
    }
  }

  function cycleTabs(dir) {
    const tabs = Array.from(document.querySelectorAll('.query-tab'));
    const curIdx = tabs.findIndex(t => t.classList.contains('active'));
    const next = (curIdx + dir + tabs.length) % tabs.length;
    kbSuggIdx = -1;
    highlightSuggestion(-1);
    renderSuggestions(tabs[next].dataset.tab);
    tabs.forEach(t => t.classList.remove('tab-focus'));
    tabs[next].classList.add('tab-focus');
  }

  document.addEventListener('keydown', function(e) {
    if (booting) return;

    // Escape: toggle menu mode
    if (e.key === 'Escape') {
      e.preventDefault();
      setMenuMode(!menuMode);
      return;
    }

    if (menuMode) {
      const items = suggestionsEl.querySelectorAll('.suggestion');

      // Left/Right
      if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
        e.preventDefault();
        if (kbSuggIdx < 0) {
          // Tab level: switch tabs
          cycleTabs(e.key === 'ArrowLeft' ? -1 : 1);
        } else {
          // Suggestion level: navigate suggestions horizontally
          if (e.key === 'ArrowLeft' && kbSuggIdx > 0) kbSuggIdx--;
          else if (e.key === 'ArrowRight' && kbSuggIdx < items.length - 1) kbSuggIdx++;
          highlightSuggestion(kbSuggIdx);
        }
        return;
      }

      // Up: back to tab level
      if (e.key === 'ArrowUp') {
        e.preventDefault();
        kbSuggIdx = -1;
        highlightSuggestion(-1);
        return;
      }
      // Down: enter suggestion level (only from tab level)
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (kbSuggIdx < 0) {
          kbSuggIdx = 0;
          highlightSuggestion(kbSuggIdx);
        }
        return;
      }

      // Enter: execute highlighted suggestion
      if (e.key === 'Enter' && kbSuggIdx >= 0 && kbSuggIdx < items.length) {
        e.preventDefault();
        items[kbSuggIdx].click();
        setMenuMode(false);
        return;
      }

      // Any printable key: exit menu mode and type
      if (e.key.length === 1 && !e.ctrlKey && !e.altKey && !e.metaKey) {
        setMenuMode(false);
        // Let the keypress pass through to input
        return;
      }
    }
  });

  // ===================== SQL TABLE RENDERER =====================
  function renderTable(columns, rows, types) {
    if (rows.length === 0) return '<span class="sql-rows">(0 rows)</span>';

    const allData = [columns, ...rows];
    const widths = columns.map((c, i) => {
      let max = c.length;
      for (const row of rows) {
        const val = row[i] === null ? 'NULL' : String(row[i]);
        if (val.length > max) max = val.length;
      }
      return Math.min(max, 45);
    });

    const isNum = (types || []).map(t => ['int','float','numeric','bigint'].includes(t));

    function sep(left, mid, right, fill) {
      return '<span class="sql-table"><span class="border">' + left + widths.map(w => fill.repeat(w + 2)).join(mid) + right + '</span></span>';
    }

    function dataRow(vals, cls, isHeader) {
      let out = '<span class="sql-table"><span class="border">│</span>';
      for (let i = 0; i < vals.length; i++) {
        let val = vals[i] === null ? '<span class="null">NULL</span>' : escapeHtml(String(vals[i]));
        const raw = vals[i] === null ? 'NULL' : String(vals[i]);
        const truncated = raw.length > widths[i] ? raw.slice(0, widths[i] - 2) + '..' : raw;
        const display = vals[i] === null ? '<span class="null">NULL</span>' : escapeHtml(truncated);
        const pad = widths[i] - (vals[i] === null ? 4 : truncated.length);

        if (isHeader) {
          out += ' <span class="header">' + display + '</span>' + ' '.repeat(pad) + ' <span class="border">│</span>';
        } else if (isNum[i] && !isHeader) {
          out += ' <span class="' + cls + '">' + ' '.repeat(pad) + display + '</span> <span class="border">│</span>';
        } else {
          // Check if value is a URL
          const rawVal = String(vals[i] || '');
          if (rawVal.startsWith('http')) {
            out += ' <a class="link" href="' + escapeHtml(rawVal) + '" target="_blank">' + display + '</a>' + ' '.repeat(pad) + ' <span class="border">│</span>';
          } else {
            out += ' <span class="' + cls + '">' + display + '</span>' + ' '.repeat(pad) + ' <span class="border">│</span>';
          }
        }
      }
      out += '</span>';
      return out;
    }

    let result = '<div class="table-scroll">';
    result += sep('┌', '┬', '┐', '─') + '\n';
    result += dataRow(columns, 'header', true) + '\n';
    result += sep('├', '┼', '┤', '─') + '\n';
    for (let r = 0; r < rows.length; r++) {
      result += dataRow(rows[r], r % 2 === 0 ? 'row-even' : 'row-odd', false) + '\n';
    }
    result += sep('└', '┴', '┘', '─') + '\n';
    result += '</div>';
    result += `<span class="sql-rows">(${rows.length} ${rows.length === 1 ? 'row' : 'rows'})</span>`;
    return result;
  }

  // ===================== SQL PARSER (simplified) =====================
  function processCommand(input) {
    if (booting) return;
    const trimmed = input.trim().replace(/;$/, '');
    if (!trimmed) return;

    history.push(input.trim());
    historyIndex = history.length;
    printPromptEcho(input.trim());

    const upper = trimmed.toUpperCase().replace(/\s+/g, ' ');

    // Meta-commands
    if (upper === 'SHOW TABLES') return cmdListTables();
    if (upper.startsWith('DESCRIBE ')) return cmdDescribeTable(trimmed.slice(9).trim());
    if (upper === 'HELP') return cmdHelp();
    if (upper === 'EXIT' || upper === 'QUIT') return cmdExit();
    if (upper === 'CLEAR') { outputEl.innerHTML = ''; return; }

    // SELECT
    if (upper.startsWith('SELECT')) return cmdSelect(trimmed);

    // EXPLAIN
    if (upper.startsWith('EXPLAIN')) return cmdExplain(trimmed);

    // DROP
    if (upper.startsWith('DROP')) {
      printOutput('<span class="error">ERROR:  permission denied — this portfolio is immutable</span>');
      return;
    }

    // DELETE / TRUNCATE
    if (upper.startsWith('DELETE') || upper.startsWith('TRUNCATE')) {
      printOutput('<span class="error">ERROR:  cannot delete from a read-only portfolio</span>');
      return;
    }

    // INSERT
    if (upper.startsWith('INSERT')) {
      printOutput('<span class="error">ERROR:  relation is read-only, accepting PRs on GitHub though</span>');
      return;
    }

    // UPDATE
    if (upper.startsWith('UPDATE')) {
      printOutput('<span class="error">ERROR:  contact me first before updating my profile ;)</span>');
      return;
    }

    printOutput(`<span class="error">ERROR:  syntax error at or near "${escapeHtml(trimmed.split(' ')[0])}"</span>\n<span class="dim">Try HELP or click a suggested query below.</span>`);
  }

  // ===================== SELECT PARSER =====================
  function cmdSelect(input) {
    const upper = input.toUpperCase().replace(/\s+/g, ' ');

    // Special: uptime query
    if (upper.includes('DATEDIFF') || (upper.includes('NOW()') && upper.includes('2008'))) {
      const start = new Date('2008-11-01');
      const now = new Date();
      const days = Math.floor((now - start) / 86400000);
      const years = Math.floor(days / 365);
      printOutput(renderTable(['uptime'], [[`${days} days (${years} years)`]], ['varchar']));
      return;
    }

    // Special: version
    if (upper.includes('VERSION()')) {
      printOutput(renderTable(['version'], [['martjn_db v1.0 (Data Engineer Edition)']], ['varchar']));
      return;
    }

    // Special: current_user
    if (upper.includes('CURRENT_USER') || upper.includes('CURRENT_DATABASE')) {
      printOutput(renderTable(['current_user', 'current_database'], [['martjn', 'martjn_db']], ['varchar','varchar']));
      return;
    }

    // Parse FROM table
    const fromMatch = input.match(/FROM\s+(\w+)/i);
    if (!fromMatch) {
      // SELECT without FROM (e.g. SELECT 1+1)
      printOutput('<span class="error">ERROR:  specify a FROM table — try: SELECT * FROM profile;</span>');
      return;
    }

    const tableName = fromMatch[1].toLowerCase();
    const table = TABLES[tableName];
    if (!table) {
      printOutput(`<span class="error">ERROR:  relation "${escapeHtml(fromMatch[1])}" does not exist</span>\n<span class="dim">Available: profile, skills, tools, experience, blocks, transactions, addresses, mempool</span>`);
      return;
    }

    // Parse SELECT columns
    const selectPart = input.match(/SELECT\s+(.+)\s+FROM\s+\w+/i);
    if (!selectPart) {
      printOutput('<span class="error">ERROR:  syntax error in SELECT</span>');
      return;
    }

    let selectedCols;
    let colIndices;
    let isAggregate = false;
    let groupByCol = null;

    // Check for GROUP BY
    const groupMatch = input.match(/GROUP\s+BY\s+(\w+)/i);
    if (groupMatch) {
      groupByCol = groupMatch[1].toLowerCase();
      isAggregate = true;
    }

    // Check for aggregate functions
    if (upper.includes('COUNT(') || upper.includes('AVG(') || upper.includes('SUM(') || upper.includes('ROUND(')) {
      isAggregate = true;
    }

    if (isAggregate && groupByCol) {
      return cmdSelectAggregate(input, table, tableName, groupByCol);
    }

    const selStr = selectPart[1].trim();
    if (selStr === '*') {
      selectedCols = [...table.columns];
      colIndices = table.columns.map((_, i) => i);
    } else {
      const parts = selStr.split(',').map(s => s.trim().toLowerCase());
      selectedCols = [];
      colIndices = [];
      for (const p of parts) {
        const idx = table.columns.findIndex(c => c.toLowerCase() === p);
        if (idx === -1) {
          printOutput(`<span class="error">ERROR:  column "${escapeHtml(p)}" does not exist in ${tableName}</span>\n<span class="dim">Columns: ${table.columns.join(', ')}</span>`);
          return;
        }
        selectedCols.push(table.columns[idx]);
        colIndices.push(idx);
      }
    }

    const types = colIndices.map(i => table.types[i]);

    // WHERE — filter on full table rows first, then project to selected columns
    let fullRows = [...table.rows];
    const whereMatch = input.match(/WHERE\s+(.+?)(?:\s+ORDER|\s+LIMIT|\s+GROUP|\s*$)/i);
    if (whereMatch) {
      fullRows = applyWhere(fullRows, table.columns, table.types, whereMatch[1]);
    }
    let rows = fullRows.map(r => colIndices.map(i => r[i]));

    // ORDER BY
    const orderMatch = input.match(/ORDER\s+BY\s+(\w+)(?:\s+(ASC|DESC))?/i);
    if (orderMatch) {
      const orderCol = orderMatch[1].toLowerCase();
      const orderDir = (orderMatch[2] || 'ASC').toUpperCase();
      const orderIdx = selectedCols.findIndex(c => c.toLowerCase() === orderCol);
      if (orderIdx !== -1) {
        rows.sort((a, b) => {
          const va = a[orderIdx], vb = b[orderIdx];
          const cmp = typeof va === 'number' ? va - vb : String(va).localeCompare(String(vb));
          return orderDir === 'DESC' ? -cmp : cmp;
        });
      }
    }

    // LIMIT
    const limitMatch = input.match(/LIMIT\s+(\d+)/i);
    if (limitMatch) {
      rows = rows.slice(0, parseInt(limitMatch[1]));
    }

    printOutput(renderTable(selectedCols, rows, types));
  }

  function applyWhere(rows, cols, types, whereStr) {
    // Support: col = 'val', col IN ('a','b'), col > N, col < N, col >= N, col LIKE '%x%'
    return rows.filter(row => {
      // IN clause
      const inMatch = whereStr.match(/(\w+)\s+IN\s*\(([^)]+)\)/i);
      if (inMatch) {
        const col = inMatch[1].toLowerCase();
        const vals = inMatch[2].split(',').map(v => v.trim().replace(/'/g, ''));
        const idx = cols.findIndex(c => c.toLowerCase() === col);
        if (idx === -1) return true;
        return vals.some(v => String(row[idx]).toLowerCase() === v.toLowerCase());
      }

      // Comparison
      const cmpMatch = whereStr.match(/(\w+)\s*(=|!=|<>|>=|<=|>|<|LIKE)\s*'?([^']*?)'?\s*$/i);
      if (cmpMatch) {
        const col = cmpMatch[1].toLowerCase();
        const op = cmpMatch[2].toUpperCase();
        const val = cmpMatch[3];
        const idx = cols.findIndex(c => c.toLowerCase() === col);
        if (idx === -1) return true;
        const cellVal = row[idx];
        const numVal = parseFloat(val);

        switch (op) {
          case '=': return String(cellVal).toLowerCase() === val.toLowerCase();
          case '!=': case '<>': return String(cellVal).toLowerCase() !== val.toLowerCase();
          case '>': return typeof cellVal === 'number' ? cellVal > numVal : false;
          case '<': return typeof cellVal === 'number' ? cellVal < numVal : false;
          case '>=': return typeof cellVal === 'number' ? cellVal >= numVal : false;
          case '<=': return typeof cellVal === 'number' ? cellVal <= numVal : false;
          case 'LIKE': {
            const pattern = val.replace(/%/g, '.*').replace(/_/g, '.');
            return new RegExp('^' + pattern + '$', 'i').test(String(cellVal));
          }
        }
      }
      return true;
    });
  }

  function cmdSelectAggregate(input, table, tableName, groupCol) {
    const groupIdx = table.columns.findIndex(c => c.toLowerCase() === groupCol);
    if (groupIdx === -1) {
      printOutput(`<span class="error">ERROR:  column "${escapeHtml(groupCol)}" does not exist</span>`);
      return;
    }

    // Group rows
    const groups = {};
    for (const row of table.rows) {
      const key = row[groupIdx];
      if (!groups[key]) groups[key] = [];
      groups[key].push(row);
    }

    // Parse select columns for aggregates
    const selectPart = input.match(/SELECT\s+(.+?)\s+FROM/i)[1];
    const selParts = selectPart.split(',').map(s => s.trim());

    const resCols = [];
    const resTypes = [];
    const resRows = [];

    // Build column definitions
    const colDefs = selParts.map(part => {
      const aggMatch = part.match(/(COUNT|AVG|SUM|MIN|MAX|ROUND)\s*\(\s*(.*?)\s*\)/i);
      if (aggMatch) {
        const func = aggMatch[1].toUpperCase();
        const inner = aggMatch[2];
        // Handle ROUND(AVG(...))
        const innerAgg = inner.match(/(AVG|SUM|COUNT)\s*\(\s*(\w+)\s*\)/i);
        if (innerAgg) {
          const alias = part.match(/AS\s+(\w+)/i);
          return { type: 'roundagg', func: innerAgg[1].toUpperCase(), col: innerAgg[2].toLowerCase(), alias: alias ? alias[1] : func.toLowerCase() };
        }
        const alias = part.match(/AS\s+(\w+)/i);
        return { type: 'agg', func, col: inner === '*' ? '*' : inner.toLowerCase(), alias: alias ? alias[1] : func.toLowerCase() };
      }
      return { type: 'col', col: part.toLowerCase().replace(/\s+as\s+\w+/i, '').trim() };
    });

    for (const def of colDefs) {
      if (def.type === 'col') { resCols.push(def.col); resTypes.push('varchar'); }
      else { resCols.push(def.alias); resTypes.push('numeric'); }
    }

    for (const [key, rows] of Object.entries(groups)) {
      const resRow = [];
      for (const def of colDefs) {
        if (def.type === 'col') {
          resRow.push(key);
        } else {
          const colIdx = def.col === '*' ? -1 : table.columns.findIndex(c => c.toLowerCase() === def.col);
          const vals = colIdx === -1 ? rows : rows.map(r => r[colIdx]).filter(v => typeof v === 'number');
          const func = def.type === 'roundagg' ? def.func : def.func;
          switch (func) {
            case 'COUNT': resRow.push(def.col === '*' ? rows.length : vals.length); break;
            case 'AVG': resRow.push(vals.length ? Math.round(vals.reduce((a,b) => a+b, 0) / vals.length) : 0); break;
            case 'SUM': resRow.push(vals.reduce((a,b) => a+b, 0)); break;
            case 'MIN': resRow.push(Math.min(...vals)); break;
            case 'MAX': resRow.push(Math.max(...vals)); break;
            default: resRow.push(null);
          }
        }
      }
      resRows.push(resRow);
    }

    // ORDER BY
    const orderMatch = input.match(/ORDER\s+BY\s+(\w+)(?:\s+(ASC|DESC))?/i);
    if (orderMatch) {
      const orderCol = orderMatch[1].toLowerCase();
      const orderDir = (orderMatch[2] || 'ASC').toUpperCase();
      const orderIdx = resCols.findIndex(c => c === orderCol);
      if (orderIdx !== -1) {
        resRows.sort((a, b) => {
          const va = a[orderIdx], vb = b[orderIdx];
          const cmp = typeof va === 'number' ? va - vb : String(va).localeCompare(String(vb));
          return orderDir === 'DESC' ? -cmp : cmp;
        });
      }
    }

    printOutput(renderTable(resCols, resRows, resTypes));
  }

  // ===================== INPUT =====================
  cmdInput.addEventListener('keydown', function(e) {
    if (booting) { e.preventDefault(); return; }
    if (e.key === 'Enter') {
      const val = cmdInput.value;
      cmdInput.value = '';
      processCommand(val);
      scrollToBottom();
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (historyIndex > 0) { historyIndex--; cmdInput.value = history[historyIndex]; }
    } else if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (historyIndex < history.length - 1) { historyIndex++; cmdInput.value = history[historyIndex]; }
      else { historyIndex = history.length; cmdInput.value = ''; }
    } else if (e.key === 'Tab') {
      e.preventDefault();
      const val = cmdInput.value.toLowerCase();
      const tableNames = Object.keys(TABLES);
      const kws = ['SELECT', 'FROM', 'WHERE', 'ORDER BY', 'LIMIT', 'GROUP BY', 'EXPLAIN', ...tableNames];
      const m = kws.filter(k => k.toLowerCase().startsWith(val));
      if (m.length === 1) cmdInput.value = m[0] + ' ';
    } else if (e.key === 'l' && e.ctrlKey) {
      e.preventDefault();
      outputEl.innerHTML = '';
    }
  });
